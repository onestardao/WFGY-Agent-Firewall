name: phase1-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate JSON config files if present
        run: |
          if [ -f config/firewall.policy.json ]; then
            node -e "JSON.parse(require('fs').readFileSync('config/firewall.policy.json','utf8')); console.log('firewall.policy.json OK')"
          else
            echo "config/firewall.policy.json not found yet, skipping"
          fi

          if [ -f config/allowlist.domains.json ]; then
            node -e "JSON.parse(require('fs').readFileSync('config/allowlist.domains.json','utf8')); console.log('allowlist.domains.json OK')"
          else
            echo "config/allowlist.domains.json not found yet, skipping"
          fi

      - name: Check Phase 1 core files if present
        run: |
          for f in \
            src/critics/securityCritic.ts \
            src/plugins/beforeToolCall.ts \
            src/types/firewallTypes.ts
          do
            if [ -f "$f" ]; then
              echo "$f exists"
            else
              echo "$f not found yet, skipping"
            fi
          done

      - name: Install dependencies if package.json exists
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json yet, skipping npm install"
          fi

      - name: Run tests if available
        run: |
          if [ -f package.json ]; then
            npm test -- --runInBand || npm test || echo "No working test script yet, skipping"
          else
            echo "No package.json yet, skipping tests"
          fi
